services:
  backend:
    build: 
      context: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:password@db:5432/db
      - REDIS_URL=redis://redis:6379/0
      - APP_NAME=App
      - SECRET_KEY=53bd75c62d71250aa002f0cff32cbe858661bb1159e15cdf454dd19b75a563f9
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=10
      - REFRESH_TOKEN_EXPIRE_DAYS=14
      - FIRST_SUPERUSER="admin"
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=db

  redis:
    image: redis:7
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: